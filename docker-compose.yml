version: "3.3"

services:
  nsecbunkerd:
    image: ghcr.io/bitsperitybtc/nsecbunkerd:latest
    build: .
    restart: unless-stopped
    pids_limit: 100
    mem_limit: 256mb
    memswap_limit: 256mb
    volumes:
      - $HOME/.nsecbunker-config:/app/config
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - migrations

  migrations:
    image: ghcr.io/bitsperitybtc/nsecbunkerd:latest
    volumes:
      - $HOME/.nsecbunker-config:/app/config
    env_file:
      - .env
    restart: no
    entrypoint: ""
    command:
      - npx
      - prisma
      - migrate
      - deploy
