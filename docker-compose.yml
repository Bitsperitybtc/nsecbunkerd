version: "3.3"

secrets:
  signer_identity:
    file: ./signer-identity.txt

services:
  nsecbunkerd:
    image: ghcr.io/bitsperitybtc/nsecbunkerd:latest
    build: .
    restart: unless-stopped
    pids_limit: 100
    mem_limit: 256mb
    memswap_limit: 256mb
    secrets:
      - signer_identity
    volumes:
      - $HOME/.nsecbunker-config:/app/config
      - ./scripts/docker-entrypoint.sh:/app/scripts/docker-entrypoint.sh:ro
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - /app/scripts/docker-entrypoint.sh
    # Host port must match the port in `baseUrl` (see config/nsecbunker.json on the mounted volume).
    ports:
      - "3009:3000"
    depends_on:
      - migrations

  migrations:
    image: ghcr.io/bitsperitybtc/nsecbunkerd:latest
    volumes:
      - $HOME/.nsecbunker-config:/app/config
    env_file:
      - .env
    restart: no
    entrypoint: ""
    command:
      - npx
      - prisma
      - migrate
      - deploy
